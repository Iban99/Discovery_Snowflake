name: dbt CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Forzar Node.js 24 para evitar deprecaciones futuras
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dbt-run:
    runs-on: windows-latest

    steps:
      # 1. Traer el código del repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Setup Conda
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: 3.10.19
          environment-file: environment.yml
          activate-environment: dbt_env

      # 3. Configurar variables de entorno para Snowflake
      - name: Set Snowflake environment variables
        run: |
          $env:SNOWFLAKE_ACCOUNT = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          $env:SNOWFLAKE_USER = "${{ secrets.SNOWFLAKE_USER }}"
          $env:SNOWFLAKE_PASSWORD = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          $env:SNOWFLAKE_ROLE = "${{ secrets.SNOWFLAKE_ROLE }}"
          $env:SNOWFLAKE_WAREHOUSE = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          $env:SNOWFLAKE_DATABASE = "${{ secrets.ANALYTICS_DATABASE }}"

      # 4. Ejecutar dependencias de dbt usando el entorno Conda
      - name: Run dbt deps
        run: conda run -n dbt_env dbt deps

      # 5. Ejecutar modelos capa por capa
      - name: Run Bronze models
        run: conda run -n dbt_env dbt run --profiles-dir . --target bronze --models bronze.* || exit 1

      - name: Run Silver models
        run: conda run -n dbt_env dbt run --profiles-dir . --target silver --models silver.* || exit 1

      - name: Run Gold models
        run: conda run -n dbt_env dbt run --profiles-dir . --target gold --models gold.* || exit 1

      # 6. Ejecutar tests dbt
      - name: Run dbt tests
        run: conda run -n dbt_env dbt test --profiles-dir .