name: dbt CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Forzar Node.js 24 para evitar deprecaciones futuras
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dbt-run:
    runs-on: windows-latest
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      ANALYTICS_DATABASE: ${{ secrets.ANALYTICS_DATABASE }}

    steps:
      # 1. Traer el código del repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Setup Conda
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: 3.10.19
          environment-file: environment.yml
          activate-environment: dbt_env

      # 3. Configurar variables de entorno para Snowflake
      - name: Set Snowflake environment variables
        run: |
          $env:SNOWFLAKE_ACCOUNT = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          $env:SNOWFLAKE_USER = "${{ secrets.SNOWFLAKE_USER }}"
          $env:SNOWFLAKE_PASSWORD = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          $env:SNOWFLAKE_ROLE = "${{ secrets.SNOWFLAKE_ROLE }}"
          $env:SNOWFLAKE_WAREHOUSE = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          $env:ANALYTICS_DATABASE = "${{ secrets.ANALYTICS_DATABASE }}"

      # 4. Ejecutar dependencias de dbt usando el entorno Conda
      - name: Run dbt deps
        run: conda run -n dbt_env dbt deps

      # 5. Ejecutar modelos capa por capa
      - name: Create dbt profile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.dbt"
          $profilePath = "$HOME\.dbt\profiles.yml"

          "discovery_snowflake:" | Out-File $profilePath
          "  target: bronze" | Out-File $profilePath -Append
          "  outputs:" | Out-File $profilePath -Append

          "    bronze:" | Out-File $profilePath -Append
          "      type: snowflake" | Out-File $profilePath -Append
          "      account: $env:SNOWFLAKE_ACCOUNT" | Out-File $profilePath -Append
          "      user: $env:SNOWFLAKE_USER" | Out-File $profilePath -Append
          "      password: $env:SNOWFLAKE_PASSWORD" | Out-File $profilePath -Append
          "      role: $env:SNOWFLAKE_ROLE" | Out-File $profilePath -Append
          "      warehouse: $env:SNOWFLAKE_WAREHOUSE" | Out-File $profilePath -Append
          "      database: $env:ANALYTICS_DATABASE" | Out-File $profilePath -Append
          "      schema: BRONZE" | Out-File $profilePath -Append
          "      threads: 1" | Out-File $profilePath -Append

          "    silver:" | Out-File $profilePath -Append
          "      type: snowflake" | Out-File $profilePath -Append
          "      account: $env:SNOWFLAKE_ACCOUNT" | Out-File $profilePath -Append
          "      user: $env:SNOWFLAKE_USER" | Out-File $profilePath -Append
          "      password: $env:SNOWFLAKE_PASSWORD" | Out-File $profilePath -Append
          "      role: $env:SNOWFLAKE_ROLE" | Out-File $profilePath -Append
          "      warehouse: $env:SNOWFLAKE_WAREHOUSE" | Out-File $profilePath -Append
          "      database: $env:ANALYTICS_DATABASE" | Out-File $profilePath -Append
          "      schema: SILVER" | Out-File $profilePath -Append
          "      threads: 1" | Out-File $profilePath -Append

          "    gold:" | Out-File $profilePath -Append
          "      type: snowflake" | Out-File $profilePath -Append
          "      account: $env:SNOWFLAKE_ACCOUNT" | Out-File $profilePath -Append
          "      user: $env:SNOWFLAKE_USER" | Out-File $profilePath -Append
          "      password: $env:SNOWFLAKE_PASSWORD" | Out-File $profilePath -Append
          "      role: $env:SNOWFLAKE_ROLE" | Out-File $profilePath -Append
          "      warehouse: $env:SNOWFLAKE_WAREHOUSE" | Out-File $profilePath -Append
          "      database: $env:ANALYTICS_DATABASE" | Out-File $profilePath -Append
          "      schema: GOLD" | Out-File $profilePath -Append
          "      threads: 1" | Out-File $profilePath -Append
      - name: Run Bronze models
        run: conda run -n dbt_env dbt run --target bronze --select bronze.* || exit 1

      - name: Run Silver models
        run: conda run -n dbt_env dbt run --target silver --select silver.* || exit 1

      - name: Run Gold models
        run: conda run -n dbt_env dbt run --target gold --select gold.* || exit 1

      # 6. Ejecutar tests dbt
      - name: Run dbt tests
        run: conda run -n dbt_env dbt test