name: dbt CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Forzar Node.js 24 para evitar deprecaciones futuras
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dbt-run:
    runs-on: windows-latest

    steps:
      # 1. Traer el código del repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Setup Conda
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: 3.10.19
          environment-file: environment.yml
          activate-environment: dbt_env

      # 3. Configurar variables de entorno para Snowflake
      - name: Set Snowflake environment variables
        run: |
          $env:SNOWFLAKE_ACCOUNT = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          $env:SNOWFLAKE_USER = "${{ secrets.SNOWFLAKE_USER }}"
          $env:SNOWFLAKE_PASSWORD = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          $env:SNOWFLAKE_ROLE = "${{ secrets.SNOWFLAKE_ROLE }}"
          $env:SNOWFLAKE_WAREHOUSE = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          $env:SNOWFLAKE_DATABASE = "${{ secrets.ANALYTICS_DATABASE }}"

      # 4. Ejecutar dependencias de dbt usando el entorno Conda
      - name: Run dbt deps
        run: conda run -n dbt_env dbt deps

      # 5. Ejecutar modelos capa por capa
      - name: Prepare dbt profile
        run: |
          mkdir -p ~/.dbt
          cp .dbt/profiles.yml ~/.dbt/profiles.yml
      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          discovery_snowflake:
            target: bronze
            outputs:
              bronze:
                type: snowflake
                account: ${SNOWFLAKE_ACCOUNT}
                user: ${SNOWFLAKE_USER}
                password: ${SNOWFLAKE_PASSWORD}
                role: ${SNOWFLAKE_ROLE}
                warehouse: ${SNOWFLAKE_WAREHOUSE}
                database: ${ANALYTICS_DATABASE}
                schema: BRONZE
                threads: 1
              silver:
                type: snowflake
                account: ${SNOWFLAKE_ACCOUNT}
                user: ${SNOWFLAKE_USER}
                password: ${SNOWFLAKE_PASSWORD}
                role: ${SNOWFLAKE_ROLE}
                warehouse: ${SNOWFLAKE_WAREHOUSE}
                database: ${ANALYTICS_DATABASE}
                schema: SILVER
                threads: 1
              gold:
                type: snowflake
                account: ${SNOWFLAKE_ACCOUNT}
                user: ${SNOWFLAKE_USER}
                password: ${SNOWFLAKE_PASSWORD}
                role: ${SNOWFLAKE_ROLE}
                warehouse: ${SNOWFLAKE_WAREHOUSE}
                database: ${ANALYTICS_DATABASE}
                schema: GOLD
                threads: 1
          EOF
      - name: Run Bronze models
        run: conda run -n dbt_env dbt run --target bronze --select bronze.* || exit 1

      - name: Run Silver models
        run: conda run -n dbt_env dbt run --target silver --select silver.* || exit 1

      - name: Run Gold models
        run: conda run -n dbt_env dbt run --target gold --select gold.* || exit 1

      # 6. Ejecutar tests dbt
      - name: Run dbt tests
        run: conda run -n dbt_env dbt test