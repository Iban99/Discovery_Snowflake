version: 2

models:
  - name: stg_region
    description: "Silver table for region, cleaned and deduplicated"
    columns:
      - name: region_id
        description: "Primary key of the region"
        tests:
          - not_null
          - unique
      - name: region_name
        description: "Name of the region"
        tests:
          - not_null

  - name: stg_nation
    description: "Silver table for nation, joined with region"
    columns:
      - name: nation_id
        description: "Primary key of the nation"
        tests:
          - not_null
          - unique
      - name: nation_name
        description: "Name of the nation"
        tests:
          - not_null
      - name: region_id
        description: "FK to stg_region"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_region')
                field: region_id
      - name: region_name
        description: "Region name from join"

  - name: stg_customer
    description: "Silver table for customer with cleaned and casted data"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: customer_name
        description: "Customer name"
        tests:
          - not_null
      - name: nation_id
        description: "FK to stg_nation"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_nation')
                field: nation_id

  - name: stg_supplier
    description: "Silver table for suppliers, cleaned and casted data"
    columns:
      - name: supplier_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: supplier_name
        description: "Supplier name"
        tests:
          - not_null
      - name: nation_id
        description: "FK to stg_nation"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_nation')
                field: nation_id

  - name: stg_part
    description: "Silver table for parts"
    columns:
      - name: part_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: part_name
        description: "Product name"
        tests:
          - not_null

  - name: stg_partsupp
    description: "Silver bridge table linking parts and suppliers, with cleaned and casted data"
    columns:
      - name: part_id
        description: "FK to stg_part"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_part')
                field: part_id
      - name: supplier_id
        description: "FK to stg_supplier"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_supplier')
                field: supplier_id

  - name: stg_orders
    description: "Silver table for orders cleaned and deduplicated"
    columns:
      - name: order_id
        description: "Primary key of orders"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK to stg_customer"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customer')
                field: customer_id
      - name: order_date
        description: "Date when the order was placed"
        tests:
          - not_null

  - name: stg_lineitem
    description: "Silver table for individual order line items representing purchased products."
    columns:
      - name: lineitem_id
        description: "Surrogate primary key for line items"
        tests:
          - not_null
          - unique
      - name: order_id
        description: "FK to stg_orders"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: line_number
        description: "Line number in order"
        tests:
          - not_null
      - name: part_id
        description: "FK to stg_part"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_part')
                field: part_id
      - name: supplier_id
        description: "FK to stg_supplier"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_supplier')
                field: supplier_id